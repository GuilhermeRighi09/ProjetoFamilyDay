    <div class="container">
        <div class="status-panel">
            <h2>Status do Veículo</h2>
            <div id="status-display" class="status-box default">
                Aguardando...
            </div>
            <h3 id="placa-display">--</h3>
            <p id="proprietario-display" style="font-weight: bold; color: #555;"></p>
        </div>

        <div class="camera-section">
            <div class="camera-box">
                <video id="video" autoplay></video>
                <canvas id="canvas" style="display:none;"></canvas>
            </div>
            <button id="btn-capturar" class="btn-senai">CAPTURAR PLACA</button>
        </div>

        <div class="leitores-box">
            <h3>Diagnóstico</h3>
            <div class="grid-leitores">
                <div class="leitor-card">
                    <span class="badge">OCR Específico</span>
                    <p id="res-especifico">---</p>
                </div>
                <div class="leitor-card">
                    <span class="badge">OCR Normal</span>
                    <p id="res-normal">---</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const btnCapturar = document.getElementById('btn-capturar');
        const statusDisplay = document.getElementById('status-display');
        const placaDisplay = document.getElementById('placa-display');
        const propDisplay = document.getElementById('proprietario-display');

        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => { video.srcObject = stream; })
            .catch(err => alert("Câmera não encontrada."));

        btnCapturar.addEventListener('click', () => {
            btnCapturar.innerText = "PROCESSANDO...";
            btnCapturar.disabled = true;

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            const imagemBase64 = canvas.toDataURL('image/jpeg');

            fetch('/processar_imagem', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ imagem: imagemBase64 })
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('res-especifico').innerText = data.especifico;
                document.getElementById('res-normal').innerText = data.normal;

                // Atualiza Texto e Cor
                statusDisplay.innerText = data.status.toUpperCase();
                placaDisplay.innerText = data.placa_lida ? `Placa: ${data.placa_lida}` : "--";
                propDisplay.innerText = data.proprietario ? `Proprietário: ${data.proprietario}` : "";

                // Lógica de Cores
                statusDisplay.className = "status-box"; // Reseta
                if(data.status === 'Liberada') {
                    statusDisplay.classList.add("liberada");
                } else if(data.status === 'Acesso Negado' || data.status === 'Bloqueada') {
                    statusDisplay.classList.add("bloqueada");
                } else if(data.status === 'Pendências') {
                    statusDisplay.classList.add("pendencias");
                } else {
                    statusDisplay.classList.add("erro");
                }

                btnCapturar.innerText = "CAPTURAR NOVA PLACA";
                btnCapturar.disabled = false;
            })
            .catch(error => {
                console.error(error);
                statusDisplay.innerText = "ERRO DE CONEXÃO";
                statusDisplay.className = "status-box erro";
                btnCapturar.innerText = "TENTAR NOVAMENTE";
                btnCapturar.disabled = false;
            });
        });
    </script>
